<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบเช็คชื่อ – ARTNOLATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1C2951;
      --orange:  #FF8C00;
      --orange2: #FFA733;
      --navy-lt: #2a3d6b;
      --gray-bg: #F4F6FB;
      --gray-1:  #E8EBF4;
      --gray-2:  #C6CCE0;
      --gray-3:  #8891AD;
      --text:    #1C2951;
      --text-sm: #5A6180;
      --white:   #FFFFFF;
      --green:   #22B573;
      --red:     #E94F4F;
      --yellow:  #F5A623;
      --shadow:  0 2px 16px rgba(28,41,81,.10);
      --radius:  12px;
    }

    html, body {
      font-family: 'Sarabun', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* =============================================
       LAYOUT SHELL
    ============================================= */
    .app-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* =============================================
       TOP HEADER (BRAND)
    ============================================= */
    .brand-header {
      background: var(--navy);
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(28,41,81,.25);
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: var(--orange);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand-text h1 {
      font-size: 20px; font-weight: 700; letter-spacing: .02em;
      line-height: 1;
    }
    .brand-text p {
      font-size: 11px; font-weight: 400; opacity: .65; letter-spacing: .12em;
      text-transform: uppercase; margin-top: 2px;
    }

    /* =============================================
       TAB NAV
    ============================================= */
    .tab-nav {
      background: var(--navy);
      display: flex;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .tab-btn {
      flex: 1;
      padding: 11px 8px;
      color: rgba(255,255,255,.5);
      font-family: 'Sarabun', sans-serif;
      font-size: 13px; font-weight: 500;
      background: none; border: none; cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab-btn.active {
      color: var(--white);
      border-bottom-color: var(--orange);
      background: rgba(255,255,255,.05);
    }
    .tab-btn:hover { color: rgba(255,255,255,.85); }

    /* =============================================
       STICKY FILTER BAR
    ============================================= */
    .sticky-filter {
      position: sticky;
      top: 73px;
      z-index: 90;
      background: var(--white);
      box-shadow: 0 2px 12px rgba(28,41,81,.08);
      padding: 14px 20px;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
    }
    .filter-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-3);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .filter-group input[type="date"],
    .filter-group select {
      padding: 8px 10px;
      border: 1.5px solid var(--gray-1);
      border-radius: 8px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--gray-bg);
      outline: none;
      transition: border .2s;
      width: 100%;
    }
    .filter-group input:focus,
    .filter-group select:focus {
      border-color: var(--navy);
      background: var(--white);
    }

    /* TYPE TOGGLE BUTTONS */
    .type-toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }
    .toggle-btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px; font-weight: 600;
      border: 2px solid var(--gray-2);
      background: var(--white);
      color: var(--gray-3);
      cursor: pointer;
      transition: all .2s;
    }
    .toggle-btn.active-inperson {
      background: var(--navy); border-color: var(--navy); color: var(--white);
    }
    .toggle-btn.active-online {
      background: var(--orange); border-color: var(--orange); color: var(--white);
    }

    /* REFRESH BTN */
    .btn-refresh {
      padding: 9px 16px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-refresh:hover { background: var(--navy-lt); }

    /* =============================================
       PAGE CONTENT
    ============================================= */
    .page { display: none; }
    .page.active { display: block; }

    .content-area { padding: 20px; max-width: 900px; margin: 0 auto; }

    /* =============================================
       STATS BAR (REPORT)
    ============================================= */
    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      flex: 1;
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-card .num {
      font-size: 26px; font-weight: 700; color: var(--navy);
      line-height: 1;
    }
    .stat-card .lbl {
      font-size: 12px; color: var(--gray-3); margin-top: 4px;
    }
    .stat-card.inperson .num { color: var(--navy); }
    .stat-card.online   .num { color: var(--orange); }

    /* =============================================
       STUDENT CARDS
    ============================================= */
    #studentList { display: flex; flex-direction: column; gap: 10px; }

    .student-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 12px;
      align-items: start;
      transition: opacity .2s, box-shadow .2s;
      position: relative;
    }
    .student-card.checked {
      background: var(--gray-1);
      opacity: .7;
      pointer-events: none;
    }
    .student-card.checked::after {
      content: "✓ เช็คชื่อแล้ว";
      position: absolute; top: 10px; right: 12px;
      font-size: 11px; font-weight: 700;
      color: var(--green);
      background: rgba(34,181,115,.12);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .stu-main { display: flex; flex-direction: column; gap: 3px; }
    .stu-name {
      font-size: 16px; font-weight: 700; color: var(--navy);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .stu-nick {
      background: var(--navy);
      color: var(--white);
      font-size: 12px; font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
    }
    .stu-meta {
      font-size: 12px; color: var(--gray-3);
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .stu-meta span { display: flex; align-items: center; gap: 4px; }
    .stu-meta i { color: var(--orange); font-size: 11px; }

    .stu-course {
      font-size: 12px; color: var(--text-sm);
      margin-top: 4px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .tag {
      background: var(--gray-bg);
      border: 1px solid var(--gray-1);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
    }
    .tag.warn { background: #FFF3E0; border-color: #FFB74D; color: #E65100; }
    .tag.danger { background: #FFEBEE; border-color: #EF9A9A; color: #C62828; }

    /* CHECK BUTTONS */
    .check-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .btn-check {
      padding: 7px 14px;
      border-radius: 8px;
      font-family: 'Sarabun', sans-serif;
      font-size: 12px; font-weight: 700;
      border: none; cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-check.inperson {
      background: var(--navy); color: var(--white);
    }
    .btn-check.inperson:hover { background: var(--navy-lt); }
    .btn-check.online {
      background: var(--orange); color: var(--white);
    }
    .btn-check.online:hover { background: var(--orange2); }
    .btn-check.drawing {
      background: #7B5EA7; color: var(--white);
    }
    .btn-check.drawing:hover { background: #6A4F91; }

    /* =============================================
       REPORT TABLE
    ============================================= */
    .report-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .report-table th {
      background: var(--navy);
      color: var(--white);
      padding: 10px 14px;
      font-size: 13px; font-weight: 600;
      text-align: left;
    }
    .report-table td {
      padding: 10px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--gray-1);
      vertical-align: middle;
    }
    .report-table tr:last-child td { border-bottom: none; }
    .report-table tr:hover td { background: var(--gray-bg); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .badge.inperson { background: rgba(28,41,81,.1); color: var(--navy); }
    .badge.online   { background: rgba(255,140,0,.15); color: #B85C00; }

    /* =============================================
       EMPTY / LOADING / TOAST
    ============================================= */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-3);
    }
    .empty-state i { font-size: 48px; margin-bottom: 12px; display: block; opacity: .4; }
    .empty-state p { font-size: 15px; }

    .loader {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-3);
      font-size: 15px;
    }
    .loader i { animation: spin 1s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(28,41,81,.3);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all .3s;
      max-width: 320px; text-align: center;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { background: var(--green); }
    #toast.error   { background: var(--red); }
    #toast.warning { background: var(--yellow); }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(28,41,81,.5);
      z-index: 8000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: 16px;
      padding: 28px;
      width: 90%; max-width: 400px;
      box-shadow: 0 8px 40px rgba(28,41,81,.25);
      text-align: center;
    }
    .modal-box .modal-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .modal-box h3 { font-size: 18px; color: var(--navy); margin-bottom: 8px; }
    .modal-box p  { font-size: 14px; color: var(--text-sm); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
    }
    .btn-confirm { background: var(--navy); color: var(--white); }
    .btn-cancel  { background: var(--gray-1); color: var(--text); }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 600px) {
      .filter-row { gap: 8px; }
      .type-toggle { flex-wrap: wrap; }
      .content-area { padding: 14px; }
      .stats-bar { gap: 8px; }
      .student-card { grid-template-columns: 1fr; }
      .check-btns { flex-direction: row; flex-wrap: wrap; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- BRAND HEADER -->
  <header class="brand-header">
    <div class="brand-icon"><i class="fa-solid fa-palette"></i></div>
    <div class="brand-text">
      <h1>ระบบเช็คชื่อ</h1>
      <p>ARTNOLATE</p>
    </div>
  </header>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('check')">
      <i class="fa-solid fa-clipboard-check"></i> เช็คชื่อ
    </button>
    <button class="tab-btn" onclick="switchTab('report')">
      <i class="fa-solid fa-chart-bar"></i> รายงานประจำวัน
    </button>
  </nav>

  <!-- =============================================
       PAGE: CHECK ATTENDANCE
  ============================================= -->
  <div id="page-check" class="page active">

    <!-- STICKY FILTERS -->
    <div class="sticky-filter">
      <div class="filter-row">
        <!-- Date -->
        <div class="filter-group" style="max-width:170px">
          <label><i class="fa-solid fa-calendar"></i> วันที่</label>
          <input type="date" id="checkDate" onchange="onFilterChange()" />
        </div>

        <!-- Type Toggle -->
        <div class="filter-group" style="max-width:200px">
          <label><i class="fa-solid fa-chalkboard-teacher"></i> รูปแบบ</label>
          <div class="type-toggle">
            <button class="toggle-btn active-inperson" id="btnInperson" onclick="setClassType('ติวสด')">ติวสด</button>
            <button class="toggle-btn" id="btnOnline" onclick="setClassType('ออนไลน์')">ออนไลน์</button>
          </div>
        </div>

        <!-- Department -->
        <div class="filter-group">
          <label><i class="fa-solid fa-building-columns"></i> ภาควิชา</label>
          <select id="deptSelect" onchange="onFilterChange()">
            <option value="ทั้งหมด">ทั้งหมด</option>
            <option>ศิลปกรรม</option>
            <option>สถาปัตยกรรม</option>
            <option>ภูมิสถาปัตยกรรม/สถาปัตยกรรมไทย</option>
            <option>สถาปัตยกรรมภายใน/ออกแบบภายใน</option>
            <option>นิเทศศิลป์/ออกแบบการสื่อสาร</option>
            <option>ภาพยนตร์</option>
            <option>อนิเมชัน</option>
            <option>การถ่ายภาพ</option>
            <option>ศิลปอุตสาหกรรม/จิวเวลรี่</option>
            <option>แฟชั่น</option>
            <option>พื้นฐาน</option>
          </select>
        </div>

        <!-- Refresh -->
        <div class="filter-group" style="max-width:100px; justify-content: flex-end; align-self: flex-end;">
          <button class="btn-refresh" onclick="loadStudents()">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- STUDENT LIST -->
    <div class="content-area">
      <div id="studentList">
        <div class="loader"><i class="fa-solid fa-circle-notch"></i> กำลังโหลดรายชื่อ...</div>
      </div>
    </div>
  </div>

  <!-- =============================================
       PAGE: REPORT
  ============================================= -->
  <div id="page-report" class="page">

    <!-- REPORT DATE FILTER -->
    <div class="sticky-filter">
      <div class="filter-row">
        <div class="filter-group" style="max-width:200px">
          <label><i class="fa-solid fa-calendar-days"></i> วันที่ดูรายงาน</label>
          <input type="date" id="reportDate" onchange="loadReport()" />
        </div>
        <div class="filter-group" style="max-width:100px; align-self:flex-end;">
          <button class="btn-refresh" onclick="loadReport()">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </div>
      </div>
    </div>

    <div class="content-area">
      <!-- STATS -->
      <div class="stats-bar" id="reportStats" style="display:none">
        <div class="stat-card">
          <div class="num" id="statTotal">0</div>
          <div class="lbl">รวมทั้งหมด</div>
        </div>
        <div class="stat-card inperson">
          <div class="num" id="statInperson">0</div>
          <div class="lbl">ติวสด</div>
        </div>
        <div class="stat-card online">
          <div class="num" id="statOnline">0</div>
          <div class="lbl">ออนไลน์</div>
        </div>
      </div>

      <!-- TABLE -->
      <div id="reportContent">
        <div class="loader"><i class="fa-solid fa-circle-notch"></i> กำลังโหลด...</div>
      </div>
    </div>
  </div>

</div><!-- end app-wrapper -->

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modalIcon">⚠️</div>
    <h3 id="modalTitle">แจ้งเตือน</h3>
    <p id="modalDesc"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-confirm" id="modalConfirm">ยืนยัน</button>
    </div>
  </div>
</div>

<!-- =============================================
     MAIN SCRIPT
============================================= -->
<script>
// =============================================
// CONFIG - แก้ URL ของ Google Apps Script ที่นี่
// =============================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbydiV31SspWt7Y9kyTOIa09f1AzzgVQQiw_6h5-Ez6qk4ScQ_OgXjHnQJ1aoXvDBnuu/exec';

// =============================================
// STATE
// =============================================
let currentClassType = 'ติวสด';
let allStudents = [];
let checkedToday = {}; // phone -> classType

// =============================================
// INIT
// =============================================
window.addEventListener('load', () => {
  const today = todayStr();
  document.getElementById('checkDate').value = today;
  document.getElementById('reportDate').value = today;
  loadStudents();
});

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

// =============================================
// TABS
// =============================================
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  event.currentTarget.classList.add('active');
  if (tab === 'report') loadReport();
}

// =============================================
// CLASS TYPE TOGGLE
// =============================================
function setClassType(type) {
  currentClassType = type;
  document.getElementById('btnInperson').className = 'toggle-btn' + (type === 'ติวสด' ? ' active-inperson' : '');
  document.getElementById('btnOnline').className   = 'toggle-btn' + (type === 'ออนไลน์' ? ' active-online' : '');
  renderStudentList();
}

function onFilterChange() {
  loadStudents();
}

// =============================================
// LOAD STUDENTS FROM GAS
// =============================================
function loadStudents() {
  const date = document.getElementById('checkDate').value;
  const dept = document.getElementById('deptSelect').value;

  document.getElementById('studentList').innerHTML =
    '<div class="loader"><i class="fa-solid fa-circle-notch"></i> กำลังโหลดรายชื่อ...</div>';

  // Load checked list first, then students
  callGAS('getCheckedToday', { date }, (checked) => {
    checkedToday = {};
    if (Array.isArray(checked)) {
      checked.forEach(c => { checkedToday[c.phone] = c.classType; });
    }

    callGAS('getStudents', { classType: currentClassType, department: dept }, (students) => {
      allStudents = students || [];
      renderStudentList();
    });
  });
}

// =============================================
// RENDER STUDENTS
// =============================================
function renderStudentList() {
  const container = document.getElementById('studentList');

  if (!allStudents.length) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-user-slash"></i>
        <p>ไม่พบรายชื่อนักเรียน<br>ที่ตรงกับเงื่อนไขที่เลือก</p>
      </div>`;
    return;
  }

  container.innerHTML = '';
  allStudents.forEach((s, i) => {
    const isChecked = checkedToday[s.phone] !== undefined;
    const card = document.createElement('div');
    card.className = 'student-card' + (isChecked ? ' checked' : '');
    card.id = 'card-' + i;

    // Warnings
    let tags = '';
    if (s.warnRemaining) {
      tags += `<span class="tag warn"><i class="fa-solid fa-triangle-exclamation"></i> ครั้งเหลือน้อย (${s.remaining})</span>`;
    }
    if (s.warnExpiry) {
      tags += `<span class="tag danger"><i class="fa-solid fa-clock"></i> คอร์สใกล้หมดอายุ (${s.courseExp})</span>`;
    }

    // Buttons
    let btns = '';
    if (!isChecked) {
      s.buttons.forEach(b => {
        let cls = 'online';
        if (b.type === 'ติวสด') cls = 'inperson';
        if (b.type === 'ออนไลน์วาดเส้น') cls = 'drawing';
        btns += `<button class="btn-check ${cls}" onclick="handleCheck(${i}, '${escHtml(b.type)}', '${escHtml(b.label)}')">${b.label}</button>`;
      });
    }

    // Remaining display
    const remDisp = s.remaining === '' ? '—' : s.remaining;
    const expDisp = s.courseExp || '—';

    card.innerHTML = `
      <div class="stu-main">
        <div class="stu-name">
          <span class="stu-nick">${escHtml(s.nickname)}</span>
          <span>${escHtml(s.fullname)}</span>
        </div>
        <div class="stu-meta">
          <span><i class="fa-solid fa-school"></i>${escHtml(s.school)}</span>
          <span><i class="fa-solid fa-rotate"></i>รอบ: ${escHtml(s.period)}</span>
        </div>
        <div class="stu-course">
          <span class="tag"><i class="fa-solid fa-book"></i> ${escHtml(s.course)}</span>
          <span class="tag">คงเหลือ: ${escHtml(remDisp)}</span>
          <span class="tag">หมดอายุ: ${escHtml(expDisp)}</span>
          ${tags}
        </div>
      </div>
      <div class="check-btns">${btns}</div>
    `;

    container.appendChild(card);
  });
}

// =============================================
// HANDLE CHECK BUTTON
// =============================================
let pendingCheck = null;

function handleCheck(idx, btnType, btnLabel) {
  const s = allStudents[idx];
  const date = document.getElementById('checkDate').value;

  let warnings = [];
  if (s.warnRemaining) warnings.push(`⚠️ จำนวนครั้งเหลือน้อย (${s.remaining} ครั้ง)`);
  if (s.warnExpiry)    warnings.push(`⏰ คอร์สใกล้หมดอายุ (${s.courseExp})`);

  pendingCheck = { idx, btnType, s, date };

  if (warnings.length > 0) {
    openModal(
      '⚠️',
      `เช็คชื่อ: ${s.nickname} – ${s.fullname}`,
      warnings.join('\n') + '\n\nยืนยันเช็คชื่อ ' + btnLabel + ' หรือไม่?',
      () => doSaveAttendance(pendingCheck, btnLabel)
    );
  } else {
    doSaveAttendance(pendingCheck, btnLabel);
  }
}

function doSaveAttendance(pending, btnLabel) {
  closeModal();
  const { idx, btnType, s, date } = pending;

  const payload = {
    date: date,
    nickname: s.nickname,
    school: s.school,
    phone: s.phone,
    department: s.department,
    period: s.period,
    classType: btnType
  };

  callGAS('saveAttendance', payload, (result) => {
    if (result.success) {
      checkedToday[s.phone] = btnType;
      renderStudentList();
      showToast('✓ เช็คชื่อ ' + s.nickname + ' สำเร็จ', 'success');
    } else {
      showToast('✗ ' + result.message, 'error');
    }
  });
}

// =============================================
// LOAD REPORT
// =============================================
function loadReport() {
  const date = document.getElementById('reportDate').value;
  document.getElementById('reportContent').innerHTML =
    '<div class="loader"><i class="fa-solid fa-circle-notch"></i> กำลังโหลด...</div>';
  document.getElementById('reportStats').style.display = 'none';

  callGAS('getAttendanceReport', { date }, (data) => {
    // Stats
    document.getElementById('statTotal').textContent    = data.summary.total;
    document.getElementById('statInperson').textContent = data.summary.inPerson;
    document.getElementById('statOnline').textContent   = data.summary.online;
    document.getElementById('reportStats').style.display = data.summary.total > 0 ? 'flex' : 'none';

    // Table
    if (!data.records.length) {
      document.getElementById('reportContent').innerHTML = `
        <div class="empty-state">
          <i class="fa-solid fa-calendar-xmark"></i>
          <p>ไม่มีข้อมูลเช็คชื่อในวันที่ที่เลือก</p>
        </div>`;
      return;
    }

    // Format display date
    const [y, m, dd] = date.split('-');
    const thMonths = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const dispDate = `${parseInt(dd)} ${thMonths[parseInt(m)-1]} ${parseInt(y)+543}`;

    let rows = data.records.map(r => {
      const btype = /ติวสด/i.test(r.classType) ? 'inperson' : 'online';
      const blabel = /ติวสด/i.test(r.classType) ? 'ติวสด' : r.classType;
      return `
        <tr>
          <td style="color:var(--gray-3)">${r.no}</td>
          <td><strong>${escHtml(r.nickname)}</strong></td>
          <td>${escHtml(r.school)}</td>
          <td>${escHtml(r.dept)}</td>
          <td><span class="badge ${btype}">${escHtml(blabel)}</span></td>
        </tr>`;
    }).join('');

    document.getElementById('reportContent').innerHTML = `
      <p style="font-size:12px;color:var(--gray-3);margin-bottom:10px">
        <i class="fa-solid fa-calendar"></i> ${dispDate}
      </p>
      <div style="overflow-x:auto">
        <table class="report-table">
          <thead>
            <tr>
              <th>#</th>
              <th>ชื่อเล่น</th>
              <th>โรงเรียน</th>
              <th>ภาควิชา</th>
              <th>รูปแบบ</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  });
}

// =============================================
// GAS CALLER
// =============================================
function callGAS(fn, params, cb) {
  const url = GAS_URL + '?fn=' + encodeURIComponent(fn) +
    '&params=' + encodeURIComponent(JSON.stringify(params));

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        showToast('❌ ' + data.error, 'error');
        return;
      }
      cb(data.result);
    })
    .catch(err => {
      console.error(err);
      showToast('❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', 'error');
    });
}

// =============================================
// MODAL
// =============================================
let modalCb = null;
function openModal(icon, title, desc, cb) {
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent  = desc;
  document.getElementById('modalConfirm').onclick = () => { cb(); closeModal(); };
  document.getElementById('modal').classList.add('open');
  modalCb = cb;
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalCb = null;
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// =============================================
// TOAST
// =============================================
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// =============================================
// UTIL
// =============================================
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
